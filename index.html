<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Онлайн-библиотека с защищённой авторизацией">
  <title>📘 База знаний</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Firebase SDK (compat — работает без сборщика) -->
  <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- Конфиг Firebase (ЗАПОЛНИ СВОИМИ КЛЮЧАМИ) -->
  <script defer src="js/firebase-config.js"></script>

  <!-- Модули приложения -->
  <script defer src="js/security.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/search.js"></script>
  <script defer src="js/library.js"></script>
  <script defer src="js/admin.js"></script>
  <script defer src="js/app.js"></script>

  <script>
    // Ждём загрузки всех скриптов
    window.addEventListener('load', () => {
      // Даём defer-скриптам время выполниться
      setTimeout(() => {
        if (window.App && window.App.start) {
          window.App.start();
        } else {
          document.getElementById('app').innerHTML = `
            <div class="login-overlay">
              <div class="login-box">
                <h2>⚠️ Ошибка загрузки</h2>
                <p>Не удалось загрузить скрипты. Открой консоль (F12) для подробностей.</p>
                <p class="hint">Возможно, нужно открыть страницу через локальный сервер (см. README.md).</p>
              </div>
            </div>
          `;
        }
      }, 100);
    });
  </script>
</head>
<body>
  <div class="container" id="app">
    <div class="login-overlay">
      <div class="login-box">
        <h2>⏳ Загрузка...</h2>
        <p class="hint">Подключаемся к Firebase...</p>
      </div>
    </div>
  </div>
  <div id="notification" class="notification"></div>
</body>
</html>
